<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XAUUSD Alert">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>🔴 XAUUSD News Alert</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --red: #ff3b3b; --red-dim: rgba(255,59,59,0.12);
    --gold: #f0b429; --gold-dim: rgba(240,180,41,0.1);
    --text: #e8e8f0; --muted: #6b6b8a; --green: #22c55e;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 16px; padding-bottom: 40px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)} }
  .alert-banner { display: none; background: var(--red-dim); border: 1px solid var(--red); border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; animation: flashBorder 1s infinite; }
  .alert-banner.show { display: flex; align-items: center; gap: 12px; }
  @keyframes flashBorder { 0%,100%{border-color:var(--red)}50%{border-color:transparent} }
  .alert-icon { font-size: 22px; }
  .alert-text strong { color: var(--red); font-size: 15px; display: block; }
  .alert-text span { font-size: 12px; color: var(--muted); }
  .time-display { text-align: center; margin-bottom: 20px; }
  .clock { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
  .date { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
  .next-news { background: var(--gold-dim); border: 1px solid rgba(240,180,41,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .next-label { font-size: 11px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
  .next-name { font-size: 14px; font-weight: 600; margin-top: 2px; }
  .next-countdown { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--gold); }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }
  .news-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .news-card.imminent { border-color: var(--red); background: var(--red-dim); animation: flashBorder 1s infinite; }
  .news-card.passed { opacity: 0.4; }
  .news-time { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); min-width: 52px; }
  .impact-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); flex-shrink: 0; box-shadow: 0 0 6px var(--red); }
  .news-info { flex: 1; }
  .news-name { font-size: 14px; font-weight: 600; }
  .news-meta { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .tag { font-size: 10px; background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,59,59,0.3); border-radius: 4px; padding: 2px 6px; }
  .manual-tag { font-size: 10px; background: rgba(240,180,41,0.1); color: var(--gold); border: 1px solid rgba(240,180,41,0.3); border-radius: 4px; padding: 2px 6px; }
  .news-timer { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); text-align: right; min-width: 60px; }
  .news-timer.soon { color: var(--red); font-weight: 700; }
  .delete-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; }
  .delete-btn:hover { color: var(--red); }
  .add-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 16px; }
  .add-title { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: 600; }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; }
  .add-input:focus { outline: none; border-color: var(--gold); }
  .add-input::placeholder { color: var(--muted); }
  .add-btn { background: var(--gold); color: #000; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { opacity: 0.9; }
  .ff-btn { width: 100%; padding: 11px; background: var(--surface); border: 1px solid rgba(240,180,41,0.3); border-radius: 8px; color: var(--gold); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; margin-bottom: 8px; }
  .ff-btn:hover { background: var(--gold-dim); }
  .refresh-info { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; font-family: 'JetBrains Mono', monospace; }
  .no-news { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }
  .install-banner { display: none; background: var(--gold-dim); border: 1px solid rgba(240,180,41,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; cursor: pointer; }
  .install-banner.show { display: flex; align-items: center; gap: 10px; }
  .install-text strong { color: var(--gold); font-size: 13px; display: block; }
  .install-text span { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ XAUUSD Alert</div>
  <div class="live-badge"><div class="live-dot"></div><span>LIVE</span></div>
</header>

<!-- Install banner -->
<div class="install-banner" id="installBanner" onclick="installApp()">
  <div style="font-size:20px">📲</div>
  <div class="install-text">
    <strong>Installer l'app</strong>
    <span>Ajouter à l'écran d'accueil</span>
  </div>
</div>

<!-- Alert -->
<div class="alert-banner" id="alertBanner">
  <div class="alert-icon">🚨</div>
  <div class="alert-text">
    <strong id="alertTitle">NEWS IMMINENTE !</strong>
    <span id="alertSubtitle">Ferme tes positions !</span>
  </div>
</div>

<!-- Clock -->
<div class="time-display">
  <div class="clock" id="clock">--:--:--</div>
  <div class="date" id="dateDisplay">--</div>
</div>

<!-- Next news -->
<div class="next-news" id="nextNewsBox" style="display:none">
  <div>
    <div class="next-label">⏱ Prochaine news rouge</div>
    <div class="next-name" id="nextNewsName">--</div>
  </div>
  <div class="next-countdown" id="nextCountdown">--:--</div>
</div>

<!-- Add manual news -->
<div class="add-section">
  <div class="add-title">➕ Ajouter une news ponctuelle</div>
  <div class="add-row">
    <input class="add-input" id="inputTime" type="time" placeholder="Heure">
    <input class="add-input" id="inputName" type="text" placeholder="Nom (ex: PMI Flash)">
  </div>
  <div class="add-row">
    <input class="add-input" id="inputCurrency" type="text" placeholder="Devise (USD/EUR...)" maxlength="5">
    <button class="add-btn" onclick="addManualNews()">Ajouter</button>
  </div>
</div>

<!-- Today news -->
<div class="section-title">📅 Aujourd'hui – News Impact Rouge</div>
<div class="news-list" id="newsList">
  <div class="no-news">Chargement...</div>
</div>

<button class="ff-btn" onclick="window.open('https://www.forexfactory.com/calendar?day=today','_blank')">
  🌐 Ouvrir ForexFactory (vérifier les news)
</button>

<div class="refresh-info" id="lastRefresh">--</div>

<script>
const WEEKLY_NEWS = [
  { time: "16:00", name: "ISM Manufacturing PMI", currency: "USD", dow: 0 },
  { time: "14:30", name: "CPI MoM", currency: "USD", dow: 1 },
  { time: "14:30", name: "Core CPI MoM", currency: "USD", dow: 1 },
  { time: "14:30", name: "ADP Employment", currency: "USD", dow: 2 },
  { time: "14:30", name: "PPI MoM", currency: "USD", dow: 2 },
  { time: "16:00", name: "ISM Services PMI", currency: "USD", dow: 2 },
  { time: "20:00", name: "FOMC Statement", currency: "USD", dow: 2 },
  { time: "20:30", name: "Conf. de presse Fed", currency: "USD", dow: 2 },
  { time: "14:30", name: "Jobless Claims", currency: "USD", dow: 3 },
  { time: "14:30", name: "Retail Sales MoM", currency: "USD", dow: 3 },
  { time: "11:00", name: "Décision taux BCE", currency: "EUR", dow: 3 },
  { time: "11:45", name: "Conf. de presse BCE", currency: "EUR", dow: 3 },
  { time: "14:30", name: "NFP – Non-Farm Payrolls", currency: "USD", dow: 4 },
  { time: "14:30", name: "Taux de chômage US", currency: "USD", dow: 4 },
  { time: "16:00", name: "UoM Consumer Sentiment", currency: "USD", dow: 4 },
];

function getManualNews() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const all = JSON.parse(localStorage.getItem('manualNews') || '[]');
    return all.filter(n => n.date === today);
  } catch(e) { return []; }
}

function saveManualNews(news) {
  try {
    const today = new Date().toISOString().split('T')[0];
    const all = JSON.parse(localStorage.getItem('manualNews') || '[]').filter(n => n.date !== today);
    localStorage.setItem('manualNews', JSON.stringify([...all, ...news.map(n => ({...n, date: today}))]));
  } catch(e) {}
}

let manualNews = getManualNews();

function addManualNews() {
  const time = document.getElementById('inputTime').value;
  const name = document.getElementById('inputName').value.trim();
  const currency = document.getElementById('inputCurrency').value.trim().toUpperCase() || 'USD';
  if (!time || !name) { alert('Heure et nom requis !'); return; }
  manualNews.push({ time, name, currency, manual: true });
  saveManualNews(manualNews);
  document.getElementById('inputTime').value = '';
  document.getElementById('inputName').value = '';
  document.getElementById('inputCurrency').value = '';
  updateNews();
}

function deleteManualNews(index) {
  manualNews.splice(index, 1);
  saveManualNews(manualNews);
  updateNews();
}

function getTodayNews() {
  const now = new Date();
  const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const weekly = WEEKLY_NEWS.filter(n => n.dow === dow).map(n => ({...n, manual: false}));
  return [...weekly, ...manualNews].sort((a, b) => a.time.localeCompare(b.time));
}

function getNewsDateTime(timeStr) {
  const now = new Date();
  const [h, m] = timeStr.split(':').map(Number);
  return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
}

function formatCountdown(ms) {
  if (ms < 0) return "Passée";
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const min = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h${String(min).padStart(2,'0')}`;
  return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR');
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('dateDisplay').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

let alertPlayed = {};

function playAlert() {
  try {
    const ctx = new AudioContext();
    [880,660,880,660,880].reduce((t, f) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'square';
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o.start(t); o.stop(t + 0.2);
      return t + 0.25;
    }, ctx.currentTime);
  } catch(e) {}
}

function updateNews() {
  const news = getTodayNews();
  const now = new Date();
  const list = document.getElementById('newsList');
  let manualIndex = 0;

  if (news.length === 0) {
    list.innerHTML = '<div class="no-news">✅ Aucune news rouge aujourd\'hui<br><small style="display:block;margin-top:6px">Ajoute une news ponctuelle si besoin</small></div>';
    document.getElementById('nextNewsBox').style.display = 'none';
    document.getElementById('alertBanner').classList.remove('show');
    return;
  }

  const nextNews = news.find(n => getNewsDateTime(n.time) > now);

  if (nextNews) {
    const diff = getNewsDateTime(nextNews.time) - now;
    document.getElementById('nextNewsName').textContent = nextNews.name;
    document.getElementById('nextCountdown').textContent = formatCountdown(diff);
    document.getElementById('nextNewsBox').style.display = 'flex';

    if (diff < 15 * 60 * 1000) {
      document.getElementById('alertBanner').classList.add('show');
      document.getElementById('alertTitle').textContent = `⚠️ ${nextNews.name}`;
      document.getElementById('alertSubtitle').textContent = `Dans ${formatCountdown(diff)} — Ferme tes positions !`;
      const key = nextNews.time + nextNews.name;
      if (!alertPlayed[key]) {
        alertPlayed[key] = true;
        playAlert();
        if (Notification.permission === 'granted') {
          new Notification('🚨 NEWS ROUGE – XAUUSD', {
            body: `${nextNews.name} dans ${formatCountdown(diff)} — Ferme tes positions !`,
            icon: 'icon.png'
          });
        }
      }
    } else {
      document.getElementById('alertBanner').classList.remove('show');
    }
  } else {
    document.getElementById('nextNewsBox').style.display = 'none';
    document.getElementById('alertBanner').classList.remove('show');
  }

  // Compteur pour index manuel
  const manualCounts = {};
  
  list.innerHTML = news.map((n, i) => {
    const dt = getNewsDateTime(n.time);
    const diff = dt - now;
    const passed = diff < 0;
    const imminent = diff > 0 && diff < 15 * 60 * 1000;
    const mIdx = n.manual ? manualNews.indexOf(n) : -1;

    return `
      <div class="news-card ${imminent?'imminent':''} ${passed?'passed':''}">
        <div class="news-time">${n.time}</div>
        <div class="impact-dot"></div>
        <div class="news-info">
          <div class="news-name">${n.name}</div>
          <div class="news-meta">${n.currency} <span class="tag">ROUGE</span>${n.manual ? '<span class="manual-tag">PONCTUELLE</span>' : ''}</div>
        </div>
        <div class="news-timer ${imminent?'soon':''}">${passed ? '✓' : formatCountdown(diff)}</div>
        ${n.manual ? `<button class="delete-btn" onclick="deleteManualNews(${manualNews.indexOf(n)})">✕</button>` : ''}
      </div>`;
  }).join('');

  document.getElementById('lastRefresh').textContent = `MAJ : ${new Date().toLocaleTimeString('fr-FR')}`;
}

// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

// Notifications permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

// Init
updateClock();
updateNews();
setInterval(() => { updateClock(); updateNews(); }, 1000);
</script>
</body>
</html>
